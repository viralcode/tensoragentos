<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AInux</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐋</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-glass: rgba(255, 255, 255, 0.06);
      --bg-glass-hover: rgba(255, 255, 255, 0.1);
      --border-glass: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --accent-bright: #818cf8;
      --success: #10b981;
      --error: #ef4444;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      cursor: default;
    }

    /* ═══ Aurora Background ═══ */
    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .aurora-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 90% 40% at 30% 60%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
      animation: aurora 20s ease-in-out infinite alternate;
    }

    .aurora-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.8) 0%, transparent 70%),
        radial-gradient(circle at 50% 0%, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
    }

    @keyframes aurora {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(-2%, 1%) rotate(1deg);
      }

      66% {
        transform: translate(1%, -2%) rotate(-0.5deg);
      }

      100% {
        transform: translate(-1%, 2%) rotate(0.5deg);
      }
    }

    /* ═══ Stars ═══ */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: var(--brightness);
      }
    }

    /* ═══ Main Layout ═══ */
    .login-screen {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      padding: 2rem;
    }

    /* ═══ Clock ═══ */
    .clock-section {
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInDown 1s ease-out 0.3s forwards;
    }

    .time {
      font-size: 5rem;
      font-weight: 200;
      letter-spacing: -4px;
      line-height: 1;
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
    }

    .date {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    /* ═══ Logo Section ═══ */
    .logo-section {
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: scale(0.8);
      animation: fadeInScale 0.8s ease-out 0.6s forwards;
    }

    .logo-whale {
      font-size: 4.5rem;
      filter: drop-shadow(0 0 30px var(--accent-glow));
      animation: float 6s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-subtitle {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* ═══ Login Card ═══ */
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border-glass);
      border-radius: 24px;
      padding: 2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease-out 0.9s forwards;
      box-shadow:
        0 0 80px rgba(99, 102, 241, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Avatar */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 50%, #06b6d4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 600;
      color: white;
      box-shadow: 0 0 30px var(--accent-glow);
      border: 2px solid rgba(255, 255, 255, 0.15);
    }

    .avatar-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 0.75rem;
    }

    .avatar-role {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.15rem;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
      animation: pulse-dot 2s infinite;
    }

    .status-dot.offline {
      background: var(--text-muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Input */
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.75rem 1rem;
      padding-right: 2.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: rgba(255, 255, 255, 0.06);
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      color: white;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .btn-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Error */
    .error-msg {
      font-size: 0.8rem;
      color: var(--error);
      text-align: center;
      margin-top: 0.75rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .error-msg.visible {
      opacity: 1;
    }

    /* ═══ Bottom Info ═══ */
    .bottom-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }

    .bottom-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* ═══ Loading Overlay ═══ */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-bright);
      text-align: center;
      line-height: 1.8;
    }

    .boot-line {
      opacity: 0;
      animation: bootLine 0.3s ease-out forwards;
    }

    @keyframes bootLine {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══ Success Transition ═══ */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease;
    }

    .success-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .success-message {
      font-size: 1.2rem;
      font-weight: 500;
      margin-top: 1rem;
      color: var(--text-secondary);
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-bright);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ═══ Animations ═══ */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <!-- Boot Loading -->
  <div class="loading-overlay" id="bootScreen">
    <div class="boot-text" id="bootText"></div>
  </div>

  <!-- Success Transition -->
  <div class="success-overlay" id="successOverlay">
    <div class="spinner-ring"></div>
    <div class="success-message">Initializing AInux Desktop...</div>
  </div>

  <!-- Background -->
  <div class="aurora-bg"></div>
  <div class="stars" id="stars"></div>

  <!-- Main Screen -->
  <div class="login-screen">
    <div class="clock-section">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="dateStr">Loading...</div>
    </div>

    <div class="logo-section">
      <div class="logo-whale">🐋</div>
      <div class="logo-text">AInux</div>
      <div class="logo-subtitle">The AI-Native Operating System</div>
    </div>

    <div class="login-card">
      <div class="avatar-section">
        <div class="avatar">A</div>
        <div class="avatar-name">Admin</div>
        <div class="avatar-role">System Administrator</div>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <span class="status-dot" id="owStatus"></span>
          <span id="owStatusText">OpenWhale</span>
        </div>
        <span>•</span>
        <div class="status-indicator">
          <span>🔒 Secure Session</span>
        </div>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter password" autofocus value="admin">
            <span class="input-icon">🔑</span>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-shimmer"></span>
          <span id="btnText">Unlock</span>
        </button>

        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-item">⚡ AInux v0.1.0</div>
    <div class="bottom-item">🐋 OpenWhale Engine</div>
    <div class="bottom-item">🔧 Kernel 6.1</div>
  </div>

  <script>
    // ═══ Stars ═══
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--brightness', (0.3 + Math.random() * 0.7).toString());
      star.style.animationDelay = Math.random() * 4 + 's';
      star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
      starsEl.appendChild(star);
    }

    // ═══ Clock ═══
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;

      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('dateStr').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ═══ Boot Sequence ═══
    const bootLines = [
      '[ OK ] AInux Kernel 6.1.0-43-arm64',
      '[ OK ] OpenWhale AI Engine v0.7.1',
      '[ OK ] Wayland Compositor Active',
      '[ OK ] Network Interface Ready',
      '▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ 100%',
    ];

    const bootText = document.getElementById('bootText');
    const bootScreen = document.getElementById('bootScreen');

    async function runBoot() {
      for (let i = 0; i < bootLines.length; i++) {
        const line = document.createElement('div');
        line.className = 'boot-line';
        line.style.animationDelay = '0s';
        line.textContent = bootLines[i];
        bootText.appendChild(line);
        await new Promise(r => setTimeout(r, 350));
      }
      await new Promise(r => setTimeout(r, 600));
      bootScreen.classList.add('hidden');
    }

    runBoot();

    // ═══ Check OpenWhale Status ═══
    async function checkOW() {
      try {
        const r = await fetch('/dashboard/api/setup/status');
        if (r.ok) {
          document.getElementById('owStatus').classList.remove('offline');
          document.getElementById('owStatusText').textContent = 'OpenWhale Online';
          return true;
        }
      } catch { }
      document.getElementById('owStatus').classList.add('offline');
      document.getElementById('owStatusText').textContent = 'OpenWhale Offline';
      return false;
    }
    checkOW();
    setInterval(checkOW, 5000);

    // ═══ Login ═══
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btnText.textContent = 'Authenticating...';
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/dashboard/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password })
        });

        const data = await res.json();

        if (data.ok) {
          // Store session
          localStorage.setItem('owSessionId', data.sessionId);

          // Show success transition
          document.getElementById('successOverlay').classList.add('visible');

          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          errorMsg.textContent = data.error || 'Authentication failed';
          errorMsg.classList.add('visible');
          btn.disabled = false;
          btnText.textContent = 'Unlock';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Connection failed — OpenWhale may be starting';
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btnText.textContent = 'Unlock';
      }
    });

    // Auto-focus password on any keypress
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== 'Tab') {
        document.getElementById('password').focus();
      }
    });
  </script>
</body>

</html>
