# AInux OS Configuration
# /etc/ainux/ainux.conf

[system]
version=0.1.0
hostname=ainux
timezone=America/New_York

[openwhale]
port=7777
auto_start=true
install_path=/opt/ainux/openwhale

[chromium]
cdp_port=9222
webmcp=true
kiosk_mode=true

[gui]
compositor=cage
theme=dark
accent_color=#6366f1

[audio]
backend=pipewire
default_volume=75

[network]
auto_connect=true
dns=1.1.1.1,8.8.8.8
