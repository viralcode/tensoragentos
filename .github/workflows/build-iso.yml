name: Build ISO & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap xorriso mtools squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin \
            qemu-user-static binfmt-support

      - name: Build ISO
        run: |
          ARCH="${{ github.event.inputs.arch || 'x86_64' }}"
          sudo ./scripts/build-iso.sh --arch=$ARCH --skip-chromium

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensoragent-os-iso
          path: tensoragent-os-*.iso
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tensoragent-os-*.iso
          generate_release_notes: true
          body: |
            ## TensorAgent OS ${{ github.ref_name }}

            ### Quick Start
            ```bash
            # Flash to USB
            sudo dd if=tensoragent-os-x86_64.iso of=/dev/sdX bs=4M status=progress

            # Or boot in QEMU
            ./scripts/run-qemu.sh
            ```

            ### What's included
            - OpenWhale AI engine
            - WhaleOS Qt6 desktop shell
            - Debian Bookworm base
            - Node.js 22, Python 3, SQLite
            - Chromium, terminal, and system tools
