# GRUB2 Configuration for AInux
# Loaded by the ISO/USB boot media

set default=0
set timeout=3

menuentry "AInux — AI Agentic Operating System" {
    linux /boot/bzImage root=/dev/sda1 ro quiet splash loglevel=3 \
        systemd.unit=graphical.target \
        vt.global_cursor_default=0
    # initrd /boot/initramfs.img
}

menuentry "AInux (Recovery Mode)" {
    linux /boot/bzImage root=/dev/sda1 ro single
}

menuentry "AInux (Debug — Verbose Boot)" {
    linux /boot/bzImage root=/dev/sda1 ro systemd.unit=multi-user.target
}
